<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucha Libre: Mask of Destiny</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MÁSCARA DE DESTINO</h1>
        <div id="rank-ui">
            <div id="rank-container">
                <div id="rank-bar"></div>
            </div>
            <span id="rank-label">RANK: #5</span>
        </div>
    </header>

    <main id="game-window">
        <section id="display-area">
            <div id="image-wrapper">
                <div id="scene-title">Bienvenido</div>
                <img id="main-image" src="img/arena.png" alt="Scene">
            </div>
            <div id="story-box">
                <p id="story-text">Jsi připraven stát se legendou mexického ringu?</p>
            </div>
        </section>

        <nav id="interaction-menu">
            <button class="btn-main" onclick="startGame()">Vytvořit zápasníka</button>
        </nav>
    </main>

    <script src="script.js"></script>
</body>
</html>
